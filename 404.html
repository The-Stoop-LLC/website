<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — THE STOOP</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 40'><rect x='0' y='28' width='8' height='12' fill='%23F5C518'/><rect x='10' y='18' width='8' height='22' fill='%23F5C518'/><rect x='20' y='8' width='8' height='32' fill='%23F5C518'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Anton&display=swap" rel="stylesheet">
<style>
  :root { --black: #000; --white: #fff; --yellow: #F5C518; --mid: #888; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black); color: var(--white);
    font-family: 'Outfit', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 40px;
  }
  body::after {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }
  .error-code {
    font-family: 'Anton', sans-serif; font-size: clamp(120px, 20vw, 300px);
    color: transparent; -webkit-text-stroke: 2px var(--yellow);
    line-height: 1; margin-bottom: 24px;
  }
  h1 { font-family: 'Outfit', sans-serif; font-size: clamp(24px, 4vw, 40px); font-weight: 800; margin-bottom: 16px; }
  p { font-size: 14px; color: var(--mid); margin-bottom: 40px; line-height: 1.8; }
  .btn {
    display: inline-block; padding: 16px 36px;
    font-family: 'Outfit', sans-serif; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase;
    text-decoration: none; background: var(--yellow);
    color: var(--black); transition: all 0.3s ease;
  }
  .btn:hover { background: #FFD700; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,197,24,0.3); }
</style>
</head>
<body>
<div>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn">Back to Home</a>
</div>

</body>
</html>
